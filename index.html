<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>EW26 — SaM Targets</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3348;
    --text: #e8eaf6;
    --text-dim: #8892b0;
    --accent: #7c6af6;

    --c-hire: #22c55e;
    --c-hire-bg: rgba(34,197,94,0.12);
    --c-partner: #60a5fa;
    --c-partner-bg: rgba(96,165,250,0.12);
    --c-product: #fb923c;
    --c-product-bg: rgba(251,146,60,0.12);
    --c-low: #6b7280;
    --c-low-bg: rgba(107,114,128,0.12);
    --c-competitor: #c084fc;
    --c-competitor-bg: rgba(192,132,252,0.12);
    --c-unknown: #facc15;
    --c-unknown-bg: rgba(250,204,21,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 15px;
    min-height: 100dvh;
  }

  /* ── Header ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px 10px;
    padding-top: calc(12px + env(safe-area-inset-top));
  }

  .header-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .search-box {
    position: relative;
    margin-bottom: 10px;
  }
  .search-box input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 12px 9px 36px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    -webkit-appearance: none;
  }
  .search-box input::placeholder { color: var(--text-dim); }
  .search-box input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    pointer-events: none;
    font-size: 15px;
  }

  .filters {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .filters::-webkit-scrollbar { display: none; }

  .filter-group {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }

  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    transition: all .15s;
    -webkit-appearance: none;
  }
  .filter-btn:active { transform: scale(0.96); }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }

  /* ── Count bar ── */
  .count-bar {
    padding: 8px 16px;
    font-size: 12px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
  }

  /* ── List ── */
  .list {
    padding: 8px 12px 80px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: background .15s, border-color .15s;
    -webkit-user-select: none;
  }
  .card:active { background: var(--surface2); border-color: var(--accent); }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 6px;
  }

  .card-name {
    font-weight: 600;
    font-size: 15px;
    line-height: 1.3;
    flex: 1;
  }

  .badge {
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
    letter-spacing: .02em;
    white-space: nowrap;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 7px;
  }

  .booth-tag {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 500;
  }
  .booth-tag .hall { color: var(--accent); }

  .card-desc {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.45;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0,0,0,.6);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-height: 92dvh;
    overflow-y: auto;
    padding: 0 0 calc(24px + env(safe-area-inset-bottom));
    animation: slideUp .25s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    display: flex;
    justify-content: center;
    padding: 12px 0 8px;
  }
  .modal-handle-bar {
    width: 40px;
    height: 4px;
    background: var(--border);
    border-radius: 4px;
  }

  .modal-header {
    padding: 4px 16px 12px;
    border-bottom: 1px solid var(--border);
  }
  .modal-company {
    font-size: 19px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 8px;
  }
  .modal-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }

  .modal-body {
    padding: 0 16px;
  }

  .section {
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .section:last-child { border-bottom: none; }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .section-value {
    font-size: 14px;
    line-height: 1.55;
    color: var(--text);
  }

  .link-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    color: var(--accent);
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
    margin-top: 4px;
    margin-right: 8px;
    transition: background .15s;
  }
  .link-btn:active { background: var(--border); }
  .link-btn svg { flex-shrink: 0; }

  .condition-legend {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 6px;
    line-height: 1.4;
    font-style: italic;
  }

  .empty {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-dim);
    font-size: 15px;
  }

  /* Condition colors */
  .cond-hire    { color: var(--c-hire);       background: var(--c-hire-bg);       }
  .cond-partner { color: var(--c-partner);    background: var(--c-partner-bg);    }
  .cond-product { color: var(--c-product);    background: var(--c-product-bg);    }
  .cond-low     { color: var(--c-low);        background: var(--c-low-bg);        }
  .cond-comp    { color: var(--c-competitor); background: var(--c-competitor-bg); }
  .cond-unknown { color: var(--c-unknown);    background: var(--c-unknown-bg);    }
</style>
</head>

const CONDITION_LEGEND = {
  "Hiring developers":    "Actively posting embedded/firmware roles → pitch nearshore capacity",
  "Looking for devpartner": "Builds embedded products, likely needs a SW outsourcing partner → warm lead",
  "Might need a product": "Product roadmap hints at embedded SW need → explore",
  "Low priority":         "Hardware-only, services-only, or wrong geography → skip or quick pass",
  "Competitor":           "Embedded dev shop → approach only as potential sub-contractor",
  "Unknown":              "No public hiring data → worth a short cold conversation at the booth"
};

function condClass(c) {
  const map = {
    "Hiring developers":     "cond-hire",
    "Looking for devpartner":"cond-partner",
    "Might need a product":  "cond-product",
    "Low priority":          "cond-low",
    "Competitor":            "cond-comp",
    "Unknown":               "cond-unknown"
  };
  return map[c] || "cond-unknown";
}

const HALLS = ["All", ...Array.from(new Set(DATA.map(d => d.hall))).sort()];
const CONDITIONS = ["All", "Hiring developers", "Looking for devpartner", "Might need a product", "Low priority", "Competitor", "Unknown"];

let activeHall = "All";
let activeCond = "All";
let searchQ = "";

function renderFilters() {
  const hf = document.getElementById("hall-filters");
  const cf = document.getElementById("cond-filters");

  hf.innerHTML = HALLS.map(h =>
    `<button class="filter-btn ${activeHall===h?'active':''}" data-hall="${h}">${h}</button>`
  ).join("");

  cf.innerHTML = CONDITIONS.map(c =>
    `<button class="filter-btn ${activeCond===c?'active':''} ${c!=='All'?condClass(c):''}" data-cond="${c}">${c==='All'?'All Conditions':c}</button>`
  ).join("");

  hf.querySelectorAll(".filter-btn").forEach(btn =>
    btn.addEventListener("click", () => { activeHall = btn.dataset.hall; renderFilters(); renderList(); })
  );
  cf.querySelectorAll(".filter-btn").forEach(btn =>
    btn.addEventListener("click", () => { activeCond = btn.dataset.cond; renderFilters(); renderList(); })
  );
}

function filtered() {
  const q = searchQ.toLowerCase();
  return DATA.filter(d => {
    if (activeHall !== "All" && d.hall !== activeHall) return false;
    if (activeCond !== "All" && d.conditions !== activeCond) return false;
    if (q && !(d.company.toLowerCase().includes(q) || d.description.toLowerCase().includes(q) || d.booth.toLowerCase().includes(q))) return false;
    return true;
  });
}

function renderList() {
  const items = filtered();
  const list = document.getElementById("list");
  document.getElementById("count-bar").textContent = `${items.length} of ${DATA.length} companies`;

  if (!items.length) {
    list.innerHTML = `<div class="empty">No companies match your filters.</div>`;
    return;
  }

  list.innerHTML = items.map((d, i) => {
    const idx = DATA.indexOf(d);
    return `<div class="card" data-idx="${idx}">
      <div class="card-top">
        <div class="card-name">${esc(d.company)}</div>
        <span class="badge ${condClass(d.conditions)}">${esc(d.conditions)}</span>
      </div>
      <div class="card-meta">
        <span class="booth-tag"><span class="hall">${esc(d.hall)}</span> · ${esc(d.booth)}</span>
        ${d.country ? `<span class="booth-tag">${esc(d.country)}</span>` : ''}
      </div>
      <div class="card-desc">${esc(d.description)}</div>
    </div>`;
  }).join("");

  list.querySelectorAll(".card").forEach(card =>
    card.addEventListener("click", () => openModal(DATA[+card.dataset.idx]))
  );
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function linkBtn(url, label, icon) {
  if (!url) return '';
  return `<a href="${url}" target="_blank" rel="noopener" class="link-btn">${icon} ${label}</a>`;
}

function openModal(d) {
  document.getElementById("m-company").textContent = d.company;

  const meta = document.getElementById("m-meta");
  meta.innerHTML = `
    <span class="badge ${condClass(d.conditions)}">${esc(d.conditions)}</span>
    <span class="booth-tag"><span class="hall">${esc(d.hall)}</span> · ${esc(d.booth)}</span>
    ${d.country ? `<span class="booth-tag">${esc(d.country)}</span>` : ''}
  `;

  const sections = [];

  if (d.description) sections.push(`
    <div class="section">
      <div class="section-label">What they do</div>
      <div class="section-value">${esc(d.description)}</div>
    </div>`);

  if (d.sam_pitch) sections.push(`
    <div class="section">
      <div class="section-label">SaM Pitch</div>
      <div class="section-value">${esc(d.sam_pitch)}</div>
    </div>`);

  if (d.hiring_signal) sections.push(`
    <div class="section">
      <div class="section-label">Hiring Signal</div>
      <div class="section-value">${esc(d.hiring_signal)}</div>
    </div>`);

  if (d.linkedin_jobs) sections.push(`
    <div class="section">
      <div class="section-label">LinkedIn Jobs (30d)</div>
      <div class="section-value">${esc(d.linkedin_jobs)}</div>
    </div>`);

  const legend = CONDITION_LEGEND[d.conditions];
  sections.push(`
    <div class="section">
      <div class="section-label">Condition</div>
      <div class="section-value"><span class="badge ${condClass(d.conditions)}">${esc(d.conditions)}</span></div>
      ${legend ? `<div class="condition-legend">${esc(legend)}</div>` : ''}
    </div>`);

  const links = [
    linkBtn(d.website, 'Website', '🌐'),
    linkBtn(d.linkedin, 'LinkedIn', 'in'),
  ].filter(Boolean).join('');

  if (links) sections.push(`
    <div class="section">
      <div class="section-label">Links</div>
      <div style="margin-top:4px">${links}</div>
    </div>`);

  document.getElementById("m-body").innerHTML = sections.join('');
  document.getElementById("modal-overlay").classList.add("open");
  document.getElementById("modal").scrollTop = 0;
}

// Close modal
document.getElementById("modal-overlay").addEventListener("click", e => {
  if (e.target === document.getElementById("modal-overlay")) closeModal();
});

// Swipe down to close
let touchStartY = 0;
document.getElementById("modal").addEventListener("touchstart", e => { touchStartY = e.touches[0].clientY; }, {passive:true});
document.getElementById("modal").addEventListener("touchend", e => {
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (dy > 80 && document.getElementById("modal").scrollTop < 5) closeModal();
}, {passive:true});

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
}

// Search
document.getElementById("search").addEventListener("input", e => {
  searchQ = e.target.value.trim();
  renderList();
});

renderFilters();
renderList();
</script>
</body>
</html>
