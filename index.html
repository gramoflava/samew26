<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>EW26 — SaM Exhibitors</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3348;
    --text: #e8eaf6;
    --text-dim: #8892b0;
    --accent: #7c6af6;
    --accent-text: #fff;
    --theme-btn-bg: #22263a;
    --theme-btn-color: #8892b0;

    --c-hire: #22c55e;    --c-hire-bg: rgba(34,197,94,0.13);
    --c-partner: #60a5fa; --c-partner-bg: rgba(96,165,250,0.13);
    --c-product: #fb923c; --c-product-bg: rgba(251,146,60,0.13);
    --c-low: #6b7280;     --c-low-bg: rgba(107,114,128,0.13);
    --c-comp: #c084fc;    --c-comp-bg: rgba(192,132,252,0.13);
    --c-unknown: #facc15; --c-unknown-bg: rgba(250,204,21,0.13);
    --c-researched: #7c6af6; --c-researched-bg: rgba(124,106,246,0.13);
  }

  html[data-theme="light"] {
    --bg: #f5f6fa;
    --surface: #ffffff;
    --surface2: #eef0f8;
    --border: #d5d9ef;
    --text: #1a1d2e;
    --text-dim: #5a6080;
    --accent: #5b4fe3;
    --accent-text: #fff;
    --theme-btn-bg: #eef0f8;
    --theme-btn-color: #5a6080;

    --c-hire: #16a34a;    --c-hire-bg: rgba(22,163,74,0.10);
    --c-partner: #2563eb; --c-partner-bg: rgba(37,99,235,0.10);
    --c-product: #ea580c; --c-product-bg: rgba(234,88,12,0.10);
    --c-low: #4b5563;     --c-low-bg: rgba(75,85,99,0.10);
    --c-comp: #7c3aed;    --c-comp-bg: rgba(124,58,237,0.10);
    --c-unknown: #b45309; --c-unknown-bg: rgba(180,83,9,0.10);
    --c-researched: #5b4fe3; --c-researched-bg: rgba(91,79,227,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 15px;
    min-height: 100dvh;
    transition: background .2s, color .2s;
  }

  /* ── Header ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px 8px;
    padding-top: calc(10px + env(safe-area-inset-top));
    transition: background .2s, border-color .2s;
  }

  .header-row1 {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 9px;
  }

  .header-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .theme-btn {
    background: var(--theme-btn-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    color: var(--theme-btn-color);
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: background .15s;
    -webkit-appearance: none;
  }
  .theme-btn:active { opacity: .7; }

  .search-box {
    position: relative;
    margin-bottom: 8px;
  }
  .search-box input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 36px 8px 36px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    -webkit-appearance: none;
    transition: background .2s, border-color .15s, color .2s;
  }
  .search-box input::placeholder { color: var(--text-dim); }
  .search-box input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute;
    left: 11px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    pointer-events: none;
    font-size: 16px;
  }
  .search-clear {
    position: absolute;
    right: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    display: none;
    padding: 2px 4px;
  }
  .search-clear.visible { display: block; }

  .filters {
    display: flex;
    gap: 5px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 1px;
    margin-bottom: 5px;
  }
  .filters:last-child { margin-bottom: 0; }
  .filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 11px;
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all .15s;
    -webkit-appearance: none;
    flex-shrink: 0;
  }
  .filter-btn:active { transform: scale(0.96); }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--accent-text);
    font-weight: 600;
  }
  .filter-btn.cond-active { font-weight: 600; }

  /* ── Count bar ── */
  .count-bar {
    padding: 6px 14px;
    font-size: 12px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    transition: border-color .2s;
  }

  /* ── List ── */
  .list { padding: 8px 10px 80px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 13px;
    margin-bottom: 7px;
    cursor: pointer;
    transition: background .15s, border-color .15s;
    -webkit-user-select: none;
    position: relative;
  }
  .card:active { background: var(--surface2); border-color: var(--accent); }
  .card.is-researched { border-left: 3px solid var(--accent); padding-left: 11px; }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 5px;
  }

  .card-name {
    font-weight: 600;
    font-size: 14px;
    line-height: 1.3;
    flex: 1;
  }

  .badge {
    flex-shrink: 0;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 20px;
    letter-spacing: .02em;
    white-space: nowrap;
    text-transform: uppercase;
  }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
    margin-bottom: 5px;
  }

  .booth-tag {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 500;
  }
  .booth-tag .hall { color: var(--accent); }

  .country-tag {
    font-size: 11px;
    color: var(--text-dim);
    background: var(--surface2);
    padding: 1px 6px;
    border-radius: 4px;
  }

  .cat-tag {
    font-size: 11px;
    color: var(--text-dim);
    font-style: italic;
  }

  .card-desc {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.45;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0,0,0,.55);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-height: 92dvh;
    overflow-y: auto;
    padding: 0 0 calc(24px + env(safe-area-inset-bottom));
    animation: slideUp .22s ease;
    transition: background .2s, border-color .2s;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }

  .modal-handle {
    display: flex;
    justify-content: center;
    padding: 10px 0 6px;
  }
  .modal-handle-bar {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 4px;
  }

  .modal-header {
    padding: 2px 16px 12px;
    border-bottom: 1px solid var(--border);
    transition: border-color .2s;
  }
  .modal-company {
    font-size: 18px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 8px;
  }
  .modal-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    align-items: center;
  }

  .modal-body { padding: 0 16px; }

  .section {
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    transition: border-color .2s;
  }
  .section:last-child { border-bottom: none; }

  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 5px;
  }
  .section-value {
    font-size: 14px;
    line-height: 1.55;
    color: var(--text);
  }

  .link-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 13px;
    color: var(--accent);
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    margin-top: 4px;
    margin-right: 8px;
    transition: background .15s;
  }
  .link-btn:active { background: var(--border); }

  .condition-legend {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 5px;
    line-height: 1.4;
    font-style: italic;
  }

  .empty {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-dim);
    font-size: 15px;
  }

  .unresearched-note {
    font-size: 12px;
    color: var(--text-dim);
    font-style: italic;
    margin-top: 8px;
  }

  /* Condition colors */
  .cond-hire    { color: var(--c-hire);    background: var(--c-hire-bg);    }
  .cond-partner { color: var(--c-partner); background: var(--c-partner-bg); }
  .cond-product { color: var(--c-product); background: var(--c-product-bg); }
  .cond-low     { color: var(--c-low);     background: var(--c-low-bg);     }
  .cond-comp    { color: var(--c-comp);    background: var(--c-comp-bg);    }
  .cond-unknown { color: var(--c-unknown); background: var(--c-unknown-bg); }
  .cond-res     { color: var(--c-researched); background: var(--c-researched-bg); }
</style>
</head>

<div class="header">
  <div class="header-row1">
    <div class="header-title">EW26 · Exhibitors</div>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">

</div>

<div class="count-bar" id="count-bar"></div>
<div class="list" id="list"></div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">

      <div class="modal-meta" id="m-meta"></div>

  </div>
</div>

// ── Theme ──
function getSystemTheme() {
  return window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
}
function applyTheme(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  document.getElementById("theme-icon").textContent = theme === "dark" ? "☀" : "☾";
  document.getElementById("theme-label").textContent = theme === "dark" ? "Light" : "Dark";
  localStorage.setItem("ew26-theme", theme);
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute("data-theme") || "dark";
  applyTheme(cur === "dark" ? "light" : "dark");
}
// Init theme: saved → system
(function() {
  const saved = localStorage.getItem("ew26-theme");
  applyTheme(saved || getSystemTheme());
})();

// ── Filters ──
const HALLS = ["All", ...Array.from(new Set(DATA.map(d => d.hall))).filter(Boolean).sort()];
const CONDITIONS = ["All", "Hiring developers", "Looking for devpartner", "Might need a product", "Low priority", "Competitor", "Unknown"];
const SCOPES = ["All", "Researched", "Not researched"];

let activeHall = "All";
let activeCond = "All";
let activeScope = "All";
let searchQ = "";

function renderFilters() {
  const hf = document.getElementById("hall-filters");
  const sf = document.getElementById("scope-filters");
  const cf = document.getElementById("cond-filters");

  hf.innerHTML = HALLS.map(h =>
    `<button class="filter-btn${activeHall===h?" active":""}" data-hall="${h}">${h}</button>`
  ).join("");

  sf.innerHTML = SCOPES.map(s => {
    let cls = "filter-btn";
    if (activeScope===s) cls += " active";
    return `<button class="${cls}" data-scope="${s}">${s}</button>`;
  }).join("") + "  <span style=\"border-left:1px solid var(--border);margin:0 2px\"></span>" +
  CONDITIONS.map(c => {
    let cls = "filter-btn";
    if (activeCond===c) cls += " active cond-active";
    return `<button class="${cls} ${c!=="All"?condClass(c):""}" data-cond="${c}">${c==="All"?"All Conditions":c}</button>`;
  }).join("");

  cf.style.display = "none"; // merged into sf row

  hf.querySelectorAll(".filter-btn").forEach(b =>
    b.addEventListener("click", () => { activeHall = b.dataset.hall; renderFilters(); renderList(); })
  );
  sf.querySelectorAll("[data-scope]").forEach(b =>
    b.addEventListener("click", () => { activeScope = b.dataset.scope; renderFilters(); renderList(); })
  );
  sf.querySelectorAll("[data-cond]").forEach(b =>
    b.addEventListener("click", () => { activeCond = b.dataset.cond; renderFilters(); renderList(); })
  );
}

function filtered() {
  const q = searchQ.toLowerCase();
  return DATA.filter(d => {
    if (activeHall !== "All" && d.hall !== activeHall) return false;
    if (activeScope === "Researched" && !d.researched) return false;
    if (activeScope === "Not researched" && d.researched) return false;
    if (activeCond !== "All" && d.conditions !== activeCond) return false;
    if (q) {
      const hay = (d.company + d.description + d.booth + d.category + d.conditions).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function esc(s) {
  return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function renderList() {
  const items = filtered();
  const total = DATA.length;
  document.getElementById("count-bar").textContent =
    `${items.length.toLocaleString()} of ${total.toLocaleString()} exhibitors`;

  if (!items.length) {
    document.getElementById("list").innerHTML = `<div class="empty">No companies match your filters.</div>`;
    return;
  }

  document.getElementById("list").innerHTML = items.map(d => {
    const idx = DATA.indexOf(d);
    const condCls = condClass(d.conditions);
    const res = d.researched;
    return `<div class="card${res?" is-researched":""}" data-idx="${idx}">
      <div class="card-top">
        <div class="card-name">${esc(d.company)}</div>
        ${res && d.conditions ? `<span class="badge ${condCls}">${esc(d.conditions)}</span>` : ""}
        ${!res ? `<span class="badge cond-res">EW26</span>` : ""}
      </div>
      <div class="card-meta">
        <span class="booth-tag"><span class="hall">${esc(d.hall)}</span>${d.booth && d.booth !== d.hall ? " · "+esc(d.booth) : ""}</span>
        ${d.country ? `<span class="country-tag">${esc(d.country)}</span>` : ""}
        ${!res && d.category ? `<span class="cat-tag">${esc(d.category)}</span>` : ""}
      </div>
      ${d.description ? `<div class="card-desc">${esc(d.description)}</div>` : ""}
    </div>`;
  }).join("");

  document.getElementById("list").querySelectorAll(".card").forEach(card =>
    card.addEventListener("click", () => openModal(DATA[+card.dataset.idx]))
  );
}

function linkBtn(url, label, icon) {
  if (!url || url === "Unknown") return "";
  return `<a href="${url}" target="_blank" rel="noopener" class="link-btn">${icon} ${label}</a>`;
}

function openModal(d) {
  document.getElementById("m-company").textContent = d.company;

  const condCls = condClass(d.conditions);
  document.getElementById("m-meta").innerHTML = `
    ${d.researched ? `<span class="badge ${condCls}">${esc(d.conditions||"—")}</span>` : `<span class="badge cond-res">Exhibitor</span>`}
    ${d.booth ? `<span class="booth-tag"><span class="hall">${esc(d.hall)}</span> · ${esc(d.booth)}</span>` : ""}
    ${d.country ? `<span class="country-tag">${esc(d.country)}</span>` : ""}
  `;

  const s = [];

  if (!d.researched) {
    s.push(`<div class="section">
      <div class="section-value unresearched-note">This exhibitor has not been researched yet. Only basic listing data is available.</div>
    </div>`);
    if (d.category) s.push(`<div class="section">
      <div class="section-label">Category</div>
      <div class="section-value">${esc(d.category)}</div>
    </div>`);
  }

  if (d.description) s.push(`<div class="section">
    <div class="section-label">What they do</div>
    <div class="section-value">${esc(d.description)}</div>
  </div>`);

  if (d.sam_pitch) s.push(`<div class="section">
    <div class="section-label">SaM Pitch</div>
    <div class="section-value">${esc(d.sam_pitch)}</div>
  </div>`);

  if (d.hiring_signal) s.push(`<div class="section">
    <div class="section-label">Hiring Signal</div>
    <div class="section-value">${esc(d.hiring_signal)}</div>
  </div>`);

  if (d.linkedin_jobs) s.push(`<div class="section">
    <div class="section-label">LinkedIn Jobs (30d)</div>
    <div class="section-value">${esc(d.linkedin_jobs)}</div>
  </div>`);

  if (d.researched && d.conditions) {
    const legend = CONDITION_LEGEND[d.conditions] || "";
    s.push(`<div class="section">
      <div class="section-label">Condition</div>
      <div class="section-value"><span class="badge ${condCls}">${esc(d.conditions)}</span></div>
      ${legend ? `<div class="condition-legend">${esc(legend)}</div>` : ""}
    </div>`);
  }

  const links = [linkBtn(d.website,"Website","🌐"), linkBtn(d.linkedin,"LinkedIn","in")].filter(Boolean).join("");
  if (links) s.push(`<div class="section">
    <div class="section-label">Links</div>
    <div style="margin-top:4px">${links}</div>
  </div>`);

  document.getElementById("m-body").innerHTML = s.join("");
  document.getElementById("modal-overlay").classList.add("open");
  document.getElementById("modal").scrollTop = 0;
}

// Close modal
document.getElementById("modal-overlay").addEventListener("click", e => {
  if (e.target === document.getElementById("modal-overlay")) closeModal();
});
let touchStartY = 0;
document.getElementById("modal").addEventListener("touchstart", e => { touchStartY = e.touches[0].clientY; }, {passive:true});
document.getElementById("modal").addEventListener("touchend", e => {
  if (e.changedTouches[0].clientY - touchStartY > 80 && document.getElementById("modal").scrollTop < 5) closeModal();
}, {passive:true});
function closeModal() { document.getElementById("modal-overlay").classList.remove("open"); }

// Search
const searchEl = document.getElementById("search");
const clearEl = document.getElementById("search-clear");
searchEl.addEventListener("input", e => {
  searchQ = e.target.value.trim();
  clearEl.classList.toggle("visible", !!searchQ);
  renderList();
});
function clearSearch() {
  searchEl.value = "";
  searchQ = "";
  clearEl.classList.remove("visible");
  renderList();
}

renderFilters();
renderList();
</script>
</body>
</html>
